<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini桑的专属造梦工坊 - 终极版</title>
    <style>
        /* ====== 全局与 CSS 变量 ====== */
        :root {
            --bg-base: #1a1b26; --bg-panel: #24283b; --bg-bubble-user: #414868; --bg-bubble-ai: #2ac3de1a;
            --border-color: #565f89; --text-main: #a9b1d6; --text-light: #c0caf5;
            --accent-primary: #f7768e; --accent-hover: #db4b4b; --accent-blue: #7aa2f7;
            --danger: #f7768e; --success: #9ece6a; --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--border-color) var(--bg-panel); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-base); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* ====== 移动端导航栏 ====== */
        .mobile-header { display: none; background-color: var(--bg-panel); padding: 15px; border-bottom: 1px solid var(--border-color); align-items: center; justify-content: space-between; z-index: 20; }
        .menu-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-light); font-size: 1.2rem; cursor: pointer; border-radius: 6px; padding: 5px 10px; }

        /* ====== 布局 ====== */
        .sidebar { width: 340px; background-color: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid var(--border-color); z-index: 30; transition: var(--transition); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h1 { margin: 0; font-size: 1.2rem; color: var(--accent-primary); letter-spacing: 1px; }
        .close-sidebar-btn { display: none; background: transparent; border: none; color: var(--danger); font-size: 1.5rem; cursor: pointer; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; transition: var(--transition); }
        
        /* ====== 会话列表 (Session) ====== */
        .session-manager { background: rgba(0,0,0,0.1); border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); }
        .session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .session-list { display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; }
        .session-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--bg-base); border-radius: 4px; cursor: pointer; border-left: 3px solid transparent; }
        .session-item:hover { background: #2f354a; }
        .session-item.active { border-left-color: var(--accent-primary); background: #2f354a; font-weight: bold; color: var(--text-light); }
        .session-item-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }

        /* ====== 表单与控件 ====== */
        label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea, select { 
            width: 100%; background-color: var(--bg-base); color: var(--text-light); border: 1px solid var(--border-color); 
            padding: 10px; border-radius: 6px; outline: none; font-family: inherit; transition: var(--transition);
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(122, 162, 247, 0.2); }
        textarea { resize: none; min-height: 80px; overflow-y: hidden; }
        
        button { background-color: var(--accent-blue); color: #1a1b26; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: var(--transition); }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button.danger { background-color: var(--danger); color: white; }
        button.icon-btn { background: transparent; color: var(--text-main); padding: 5px; font-size: 1rem; border: 1px solid transparent; cursor: pointer;}
        button.icon-btn:hover { border-color: var(--border-color); border-radius: 4px; color: var(--text-light); background: rgba(255,255,255,0.05); }

        .api-tools { display: flex; gap: 10px; margin-top: 5px; }
        .api-tools button { flex: 1; padding: 6px; font-size: 0.8rem; background-color: #414868; color: var(--text-light); }

        /* ====== 开关 & 提示词 ====== */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .toggle-row input[type="checkbox"] { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
        .prompt-manager { background-color: rgba(0,0,0,0.1); border-radius: 8px; padding: 10px; border: 1px dashed var(--border-color); }
        .prompt-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .prompt-item { display: flex; gap: 10px; align-items: flex-start; background: var(--bg-base); padding: 8px; border-radius: 6px; border-left: 3px solid var(--accent-blue); }
        .prompt-item.inactive { border-left-color: var(--border-color); opacity: 0.6; }
        .prompt-item textarea { min-height: 40px; padding: 5px; flex: 1; font-size: 0.85rem; }

        /* ====== 聊天区与消息格式化 ====== */
        .chat-header { padding: 15px 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--text-light); }
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .message-wrapper.user { align-self: flex-end; }
        .message-wrapper.ai { align-self: flex-start; }
        .message { padding: 12px 18px; border-radius: 12px; line-height: 1.6; position: relative; word-break: break-word; font-size: 0.95rem; }
        .message-wrapper.user .message { background-color: var(--bg-bubble-user); border-bottom-right-radius: 2px; }
        .message-wrapper.ai .message { background-color: var(--bg-bubble-ai); border: 1px solid var(--accent-blue); border-bottom-left-radius: 2px; }
        
        .chat-image { max-width: 300px; border-radius: 8px; margin-top: 10px; display: block; border: 1px solid var(--border-color); }

        pre { background-color: #16161e; padding: 12px; border-radius: 6px; overflow-x: auto; border: 1px solid #292e42; margin: 10px 0; }
        code { font-family: 'Consolas', 'Courier New', monospace; color: #7dcfff; font-size: 0.9em; }
        .think-fold { margin: 10px 0; background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid #414868; overflow: hidden; }
        .think-fold summary { padding: 8px 12px; cursor: pointer; font-size: 0.85rem; color: #bb9af7; font-weight: bold; user-select: none; background: rgba(0,0,0,0.1); }
        .think-content { padding: 12px; font-size: 0.85rem; color: #7a88cf; border-top: 1px solid #414868; white-space: pre-wrap; }

        .msg-actions { display: flex; gap: 5px; position: absolute; bottom: -30px; opacity: 0; transition: var(--transition); background: var(--bg-panel); padding: 4px; border-radius: 6px; border: 1px solid var(--border-color); z-index: 5; }
        .message-wrapper:hover .msg-actions { opacity: 1; bottom: -35px; }
        .message-wrapper.user .msg-actions { right: 0; }
        .message-wrapper.ai .msg-actions { left: 0; }
        .edit-area { display: none; flex-direction: column; gap: 10px; width: 100%; min-width: 250px;}
        .edit-controls { display: flex; gap: 10px; justify-content: flex-end; }
        .is-editing .message { display: none; }
        .is-editing .edit-area { display: flex; }
        .is-editing .msg-actions { display: none; }

        /* ====== 输入区 & 图片预览 ====== */
        .input-container { padding: 15px; background-color: var(--bg-panel); border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .top-bar-input { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #565f89; }
        
        .image-preview-container { display: none; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px dashed var(--border-color); position: relative; width: fit-content; }
        .image-preview-container.active { display: flex; }
        .image-preview-container img { height: 60px; border-radius: 4px; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        .input-wrapper { display: flex; gap: 10px; position: relative; align-items: flex-end; }
        .attach-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); font-size: 1.2rem; padding: 10px; border-radius: 8px; cursor: pointer; transition: var(--transition); height: 45px; display: flex; align-items: center; justify-content: center; }
        .attach-btn:hover { background: rgba(255,255,255,0.1); }
        #mainInput { flex: 1; max-height: 200px; padding-right: 90px; transition: height 0.1s; }
        .send-btn-wrapper { position: absolute; right: 8px; bottom: 8px; }

        /* ====== Toast ====== */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background-color: var(--bg-panel); color: var(--text-light); padding: 12px 24px; border-radius: 8px; border-left: 4px solid var(--accent-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: bold; opacity: 0; transform: translateY(-20px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        /* ====== 响应式适配 (手机端) ====== */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100%; width: 85%; max-width: 350px; box-shadow: 5px 0 15px rgba(0,0,0,0.7); }
            .sidebar.open { left: 0; }
            .close-sidebar-btn { display: block; }
            .main-chat { width: 100vw; }
            .message-wrapper { max-width: 95%; }
            .msg-actions { opacity: 1; position: static; background: transparent; border: none; justify-content: flex-end; margin-top: 5px; }
            .message-wrapper:hover .msg-actions { bottom: 0; }
            #mainInput { padding-right: 10px; }
            .send-btn-wrapper { position: static; }
            .input-wrapper { flex-direction: column; align-items: stretch; }
        }
        .sidebar-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 25; }
        .sidebar-overlay.open { display: block; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>⚙️ TAVERNA 控制台</h1>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-content">
            
            <div class="session-manager">
                <div class="session-header">
                    <label style="margin:0;">📚 剧本大纲 (多会话)</label>
                    <button class="icon-btn" onclick="createNewSession()" title="新建剧本">➕</button>
                </div>
                <div class="session-list" id="sessionListUI"></div>
            </div>

            <div class="setting-group">
                <label>🌐 API 端点 (URL)</label>
                <input type="text" id="apiUrl" value="https://grsaiapi.com/v1/chat/completions">
            </div>
            <div class="setting-group">
                <label>🔑 API 密钥</label>
                <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="setting-group">
                <label>🧠 模型选择</label>
                <select id="modelSelect">
                    <option value="gemini-3.1-pro">gemini-3.1-pro (支持识图/长文)</option>
                    <option value="gemini-3-pro">gemini-3-pro</option>
                    <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                    <option value="nano-banana">nano-banana</option>
                    <option value="nano-banana-fast">nano-banana-fast</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>🗜️ 记忆轮数限制 (降耗神器)</label>
                <select id="memoryLimit">
                    <option value="0">0 (无记忆单次问答)</option>
                    <option value="5">最近 5 轮</option>
                    <option value="10" selected>最近 10 轮</option>
                    <option value="20">最近 20 轮</option>
                    <option value="999">全部携带 (谨慎)</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="toggle-row">
                    <span>🌊 开启流式输出</span>
                    <input type="checkbox" id="streamToggle" checked>
                </label>
            </div>
            <div class="setting-group">
                <label>📜 核心世界观 (System Prompt)</label>
                <textarea id="systemPrompt">你是松原青杉，黑道家族的大少爷。现在你正和仁菜在同一个屋檐下生活，用轻松诙谐的语气回应。</textarea>
            </div>
            <div class="setting-group prompt-manager">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin:0;">💉 隐式提示词库</label>
                    <button class="icon-btn" onclick="addPrompt()">➕</button>
                </div>
                <div class="prompt-list" id="promptListUI"></div>
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="mobile-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰ 展开设置</button>
            <span style="font-weight: bold; color: var(--accent-primary);">TAVERNA</span>
        </div>

        <div class="chat-header">
            <span id="currentSessionTitle">未命名剧本</span>
            <div style="display:flex; gap:10px;">
                <button class="icon-btn" onclick="exportChatMarkdown()" title="导出Markdown存档">💾 导出剧本</button>
                <button class="icon-btn" onclick="clearCurrentHistory()" style="color:var(--danger)" title="清空当前记忆">🗑️</button>
            </div>
        </div>

        <div id="toast-container"></div>
        <div class="chat-history" id="chatBox"></div>

        <div class="input-container">
            <div class="top-bar-input">
                <span>支持图片上传、Markdown代码</span>
                <span id="tokenCounter">估算消耗: 0 Tokens</span>
            </div>
            
            <div class="image-preview-container" id="imgPreviewBox">
                <img id="imgPreview" src="">
                <button class="remove-img-btn" onclick="removeImage()">×</button>
            </div>

            <div class="input-wrapper">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="上传图片">🖼️</button>
                
                <textarea id="mainInput" placeholder="输入对话... (Ctrl + Enter 发送)" oninput="autoResize(this)"></textarea>
                
                <div class="send-btn-wrapper">
                    <button id="sendBtn" onclick="handleSend()">发送 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ====== 数据模型重构 ====== */
        const STATE = {
            sessions: JSON.parse(localStorage.getItem('tvn_sessions')) || [{ id: 's_default', title: '初始剧本', history: [] }],
            currentSessionId: localStorage.getItem('tvn_current_session') || 's_default',
            prompts: JSON.parse(localStorage.getItem('tvn_prompts')) || [{ id: Date.now(), text: "[保持吐槽风]", active: true }],
            isGenerating: false,
            currentImageBase64: null // 保存上传图片的 Base64
        };

        const els = {
            apiUrl: document.getElementById('apiUrl'), apiKey: document.getElementById('apiKey'),
            modelSelect: document.getElementById('modelSelect'), streamToggle: document.getElementById('streamToggle'),
            memoryLimit: document.getElementById('memoryLimit'), systemPrompt: document.getElementById('systemPrompt'), 
            promptListUI: document.getElementById('promptListUI'), chatBox: document.getElementById('chatBox'), 
            mainInput: document.getElementById('mainInput'), sendBtn: document.getElementById('sendBtn'), 
            counter: document.getElementById('tokenCounter'), sidebar: document.getElementById('sidebar'), 
            overlay: document.getElementById('sidebarOverlay'), sessionListUI: document.getElementById('sessionListUI'),
            titleUI: document.getElementById('currentSessionTitle'),
            imgPreviewBox: document.getElementById('imgPreviewBox'), imgPreview: document.getElementById('imgPreview')
        };

        function getCurSession() {
            let s = STATE.sessions.find(s => s.id === STATE.currentSessionId);
            if(!s) { s = STATE.sessions[0]; STATE.currentSessionId = s.id; }
            return s;
        }

        // UI 初始化与持久化
        function init() {
            ['apiUrl', 'apiKey', 'modelSelect', 'systemPrompt', 'memoryLimit'].forEach(id => {
                if(localStorage.getItem('tvn_'+id)) els[id].value = localStorage.getItem('tvn_'+id);
                els[id].addEventListener('change', () => localStorage.setItem('tvn_'+id, els[id].value));
            });
            if(localStorage.getItem('tvn_streamToggle') !== null) els.streamToggle.checked = localStorage.getItem('tvn_streamToggle') === 'true';
            els.streamToggle.addEventListener('change', () => localStorage.setItem('tvn_streamToggle', els.streamToggle.checked));
            
            renderSessions(); renderPrompts(); renderChat();
        }

        function saveData() {
            localStorage.setItem('tvn_sessions', JSON.stringify(STATE.sessions));
            localStorage.setItem('tvn_current_session', STATE.currentSessionId);
            localStorage.setItem('tvn_prompts', JSON.stringify(STATE.prompts));
        }

        /* ====== 多会话管理 (Sessions) ====== */
        function renderSessions() {
            els.sessionListUI.innerHTML = '';
            STATE.sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = `session-item ${s.id === STATE.currentSessionId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="session-item-title" onclick="switchSession('${s.id}')">${s.title}</div>
                    <button class="icon-btn" onclick="deleteSession('${s.id}')" style="color:var(--danger)">🗑️</button>
                `;
                els.sessionListUI.appendChild(div);
            });
            els.titleUI.textContent = getCurSession().title;
        }

        function createNewSession() {
            const title = prompt("请输入新剧本名称：", "新剧本 " + (STATE.sessions.length + 1));
            if(!title) return;
            const newId = 's_' + Date.now();
            STATE.sessions.push({ id: newId, title: title, history: [] });
            STATE.currentSessionId = newId;
            saveData(); renderSessions(); renderChat();
        }

        function switchSession(id) {
            if(STATE.isGenerating) return showToast("生成中，请勿切换", "error");
            STATE.currentSessionId = id;
            saveData(); renderSessions(); renderChat();
        }

        function deleteSession(id) {
            if(STATE.sessions.length <= 1) return showToast("至少保留一个剧本", "error");
            if(confirm("确定删除这个剧本吗？")) {
                STATE.sessions = STATE.sessions.filter(s => s.id !== id);
                if(STATE.currentSessionId === id) STATE.currentSessionId = STATE.sessions[0].id;
                saveData(); renderSessions(); renderChat();
            }
        }

        /* ====== 图片上传 (Base64) ====== */
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) return showToast("图片不能超过 5MB", "error");

            const reader = new FileReader();
            reader.onload = function(e) {
                STATE.currentImageBase64 = e.target.result;
                els.imgPreview.src = STATE.currentImageBase64;
                els.imgPreviewBox.classList.add('active');
                event.target.value = ''; // clear
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            STATE.currentImageBase64 = null;
            els.imgPreviewBox.classList.remove('active');
            els.imgPreview.src = '';
        }

        /* ====== 导出功能 (Markdown 下载) ====== */
        function exportChatMarkdown() {
            const session = getCurSession();
            if(session.history.length === 0) return showToast("剧本为空，无需导出", "error");
            
            let mdContent = `# ${session.title}\n\n*System Prompt: ${els.systemPrompt.value}*\n\n---\n\n`;
            session.history.forEach(msg => {
                const roleName = msg.role === 'user' ? '**[你]**' : '**[Gemini桑]**';
                let text = msg.content;
                // 处理如果是多模态数组的情况
                if (Array.isArray(msg.content)) {
                    text = msg.content.find(item => item.type === 'text')?.text || "[包含图片]";
                }
                mdContent += `${roleName}:\n${text}\n\n`;
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${session.title}_export_${new Date().getTime()}.md`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            showToast("剧本导出成功！", "success");
        }

        /* ====== 工具辅助函数 ====== */
        function toggleSidebar() { els.sidebar.classList.toggle('open'); els.overlay.classList.toggle('open'); }
        function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight) + 'px'; els.counter.textContent = `估算消耗: ~${Math.ceil(ta.value.length * 1.5)} Tokens`; }
        function showToast(msg, type = 'normal') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // 格式化消息渲染 (支持字符串和多模态数组)
        function renderMessageContent(content) {
            if (typeof content === 'string') return formatText(content);
            if (Array.isArray(content)) {
                let html = '';
                content.forEach(item => {
                    if (item.type === 'text') html += formatText(item.text);
                    if (item.type === 'image_url') html += `<img class="chat-image" src="${item.image_url.url}">`;
                });
                return html;
            }
            return '';
        }

        function formatText(text) {
            if (!text) return "";
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html = html.replace(/&lt;think&gt;([\s\S]*?)&lt;\/think&gt;/gi, (m, p1) => `<details class="think-fold"><summary>🧠 思考过程</summary><div class="think-content">${p1.trim()}</div></details>`);
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code class="language-${lang}">${code.trim()}</code></pre>`);
            html = html.replace(/\n/g, '<br/>');
            html = html.replace(/<pre>([\s\S]*?)<\/pre>/g, function(m) { return m.replace(/<br\/>/g, '\n'); });
            return html;
        }

        /* ====== 提示词与聊天渲染 ====== */
        function renderPrompts() { /* ...同上版本... */ 
            els.promptListUI.innerHTML = '';
            STATE.prompts.forEach((p, i) => {
                const div = document.createElement('div'); div.className = `prompt-item ${p.active ? '' : 'inactive'}`;
                div.innerHTML = `<input type="checkbox" ${p.active ? 'checked' : ''} onchange="togglePrompt(${i}, this.checked)"><textarea onchange="updatePrompt(${i}, this.value)">${p.text}</textarea><button class="icon-btn" onclick="deletePrompt(${i})" style="color:var(--danger)">🗑️</button>`;
                els.promptListUI.appendChild(div);
            });
        }
        function addPrompt() { STATE.prompts.push({ id: Date.now(), text: "", active: true }); saveData(); renderPrompts(); }
        function togglePrompt(i, state) { STATE.prompts[i].active = state; saveData(); renderPrompts(); }
        function updatePrompt(i, val) { STATE.prompts[i].text = val; saveData(); }
        function deletePrompt(i) { STATE.prompts.splice(i, 1); saveData(); renderPrompts(); }

        function renderChat() {
            els.chatBox.innerHTML = '';
            const session = getCurSession();
            session.history.forEach((msg, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role === 'user' ? 'user' : 'ai'}`;
                wrapper.id = `msg-${msg.id}`;
                
                const isLastMsg = index === session.history.length - 1;
                const retryBtnHtml = (msg.role === 'assistant' && isLastMsg) ? `<button class="icon-btn" onclick="retryMessage('${msg.id}')">🔄</button>` : '';

                // 编辑内容如果是数组提取文本部分
                const rawTextForEdit = Array.isArray(msg.content) ? (msg.content.find(i=>i.type==='text')?.text || "") : msg.content;

                wrapper.innerHTML = `
                    <div class="message">${renderMessageContent(msg.content)}</div>
                    <div class="edit-area">
                        <textarea id="edit-input-${msg.id}">${rawTextForEdit}</textarea>
                        <div class="edit-controls"><button onclick="cancelEdit('${msg.id}')" style="background:transparent; border:1px solid #565f89">取消</button><button onclick="saveEdit('${msg.id}')">💾</button></div>
                    </div>
                    <div class="msg-actions">
                        <button class="icon-btn" onclick="startEdit('${msg.id}')">✏️</button>
                        <button class="icon-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>
                        ${retryBtnHtml}
                    </div>
                `;
                els.chatBox.appendChild(wrapper);
            });
            els.chatBox.scrollTop = els.chatBox.scrollHeight;
        }

        // 消息操作 (基于当前 Session)
        function getMsgIndex(id) { return getCurSession().history.findIndex(m => m.id == id); }
        function deleteMessage(id) { getCurSession().history.splice(getMsgIndex(id), 1); saveData(); renderChat(); }
        function startEdit(id) { document.getElementById(`msg-${id}`).classList.add('is-editing'); }
        function cancelEdit(id) { document.getElementById(`msg-${id}`).classList.remove('is-editing'); }
        function saveEdit(id) { 
            const nv = document.getElementById(`edit-input-${id}`).value; 
            if(nv){ 
                const msg = getCurSession().history[getMsgIndex(id)];
                // 仅覆盖文本内容，保留图片
                if(Array.isArray(msg.content)) {
                    let textObj = msg.content.find(i => i.type === 'text');
                    if(textObj) textObj.text = nv; else msg.content.unshift({type: 'text', text: nv});
                } else {
                    msg.content = nv;
                }
                saveData(); renderChat(); showToast("已保存", "success"); 
            } 
        }
        function clearCurrentHistory() { if(confirm("清空当前剧本的对话？")) { getCurSession().history = []; saveData(); renderChat(); } }
        async function retryMessage(id) {
            if(STATE.isGenerating) return;
            const session = getCurSession();
            const idx = getMsgIndex(id); if(idx !== session.history.length - 1 || session.history[idx].role !== 'assistant') return;
            session.history.pop(); saveData(); renderChat();
            await executeCall();
        }

        /* ====== API 核心逻辑 (加入多模态与滑动窗口) ====== */
        async function handleSend() {
            const text = els.mainInput.value.trim();
            if(!text && !STATE.currentImageBase64) return;
            if(STATE.isGenerating) return showToast("AI 思考中...", "error");

            let finalContent = text;
            // 处理带图片的 Vision 格式
            if (STATE.currentImageBase64) {
                finalContent = [
                    { type: "text", text: text || "请描述这张图片" },
                    { type: "image_url", image_url: { url: STATE.currentImageBase64 } }
                ];
                removeImage(); // 发送后清空预览区
            }

            const session = getCurSession();
            session.history.push({ id: Date.now(), role: 'user', content: finalContent });
            saveData(); 
            els.mainInput.value = ''; els.mainInput.style.height = 'auto'; els.counter.textContent = "估算消耗: 0 Tokens";
            renderChat();
            await executeCall();
        }

        async function executeCall() {
            const apiUrl = els.apiUrl.value.trim(); const apiKey = els.apiKey.value.trim();
            if(!apiUrl || !apiKey) return showToast("请填写 API 信息", "error");

            STATE.isGenerating = true; els.sendBtn.textContent = '思考中...'; els.sendBtn.style.opacity = '0.5';

            const apiMessages = [{ role: 'system', content: els.systemPrompt.value }];
            const activePromptsText = STATE.prompts.filter(p => p.active && p.text.trim()).map(p => p.text.trim()).join('\n\n');

            const session = getCurSession();
            
            // 🔥 记忆截断 (滑动窗口逻辑)
            let limit = parseInt(els.memoryLimit.value);
            let historyToUse = session.history;
            if(limit > 0 && limit < session.history.length) {
                historyToUse = session.history.slice(-limit); // 仅截取最后 N 条
            } else if (limit === 0) {
                historyToUse = [session.history[session.history.length - 1]]; // 无记忆
            }

            historyToUse.forEach((msg, index) => {
                // 深拷贝防止污染本地数据
                let msgCopy = JSON.parse(JSON.stringify({ role: msg.role, content: msg.content }));
                
                // 隐式注入
                if (index === historyToUse.length - 1 && msg.role === 'user' && activePromptsText) {
                    if(typeof msgCopy.content === 'string') {
                        msgCopy.content += "\n\n" + activePromptsText;
                    } else if (Array.isArray(msgCopy.content)) {
                        let textNode = msgCopy.content.find(i => i.type === 'text');
                        if(textNode) textNode.text += "\n\n" + activePromptsText;
                    }
                }
                apiMessages.push(msgCopy);
            });

            const isStream = els.streamToggle.checked;
            const requestBody = { model: els.modelSelect.value, stream: isStream, messages: apiMessages };

            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify(requestBody) });
                if (!response.ok) throw new Error(`HTTP 错误: ${response.status}`);

                if (!isStream) {
                    const data = await response.json();
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        session.history.push({ id: Date.now(), role: 'assistant', content: data.choices[0].message.content });
                    }
                    saveData(); renderChat();
                } else {
                    session.history.push({ id: Date.now(), role: 'assistant', content: '' });
                    const currentIndex = session.history.length - 1;
                    renderChat();

                    const reader = response.body.getReader(); const decoder = new TextDecoder('utf-8'); let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n'); buffer = lines.pop(); 

                        for (const line of lines) {
                            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                try {
                                    const delta = JSON.parse(line.slice(6)).choices[0]?.delta?.content || '';
                                    if (delta) {
                                        session.history[currentIndex].content += delta;
                                        const aiMsgEl = document.getElementById(`msg-${session.history[currentIndex].id}`).querySelector('.message');
                                        aiMsgEl.innerHTML = renderMessageContent(session.history[currentIndex].content);
                                        els.chatBox.scrollTop = els.chatBox.scrollHeight;
                                    }
                                } catch (e) { }
                            }
                        }
                    }
                    saveData(); renderChat();
                }
            } catch (error) {
                showToast("请求失败，详情见控制台", "error");
                session.history.push({ id: Date.now(), role: 'assistant', content: `[系统报错：${error.message}]` });
                saveData(); renderChat();
            } finally {
                STATE.isGenerating = false; els.sendBtn.textContent = '发送 🚀'; els.sendBtn.style.opacity = '1';
            }
        }

        els.mainInput.addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); handleSend(); } });
        init();
    </script>
</body>
